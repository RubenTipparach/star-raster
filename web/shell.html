<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StarRaster</title>
<style>
* { margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
}
@media (hover: none) and (pointer: coarse) {
    canvas { image-rendering: auto; }
}
#loading {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #aaa;
    font-family: monospace;
    font-size: 16px;
}
#play-btn {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 48px;
    font-family: monospace;
    font-size: 24px;
    color: #fff;
    background: #2a2a4e;
    border: 2px solid #aaa;
    cursor: pointer;
    z-index: 10;
}
#rotate-msg {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: #000;
    color: #aaa;
    font-family: monospace;
    font-size: 18px;
    z-index: 100;
    justify-content: center;
    align-items: center;
    text-align: center;
}
@media (hover: none) and (pointer: coarse) and (orientation: portrait) {
    #rotate-msg { display: flex; }
    canvas, #play-btn, #loading { display: none !important; }
}
</style>
</head>
<body>
<div id="rotate-msg">Please rotate your device to landscape mode</div>
<div id="loading">Loading StarRaster...</div>
<button id="play-btn">PLAY</button>
<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
<script>
    // Prevent space/arrows/tab from scrolling the page (itch.io iframe)
    window.addEventListener('keydown', function(e) {
        if ([32, 37, 38, 39, 40, 9].indexOf(e.keyCode) !== -1) {
            e.preventDefault();
        }
    }, { passive: false });

    var Module = {
        canvas: (function() {
            var canvas = document.getElementById('canvas');
            canvas.setAttribute('tabindex', '0');
            canvas.addEventListener('webglcontextlost', function(e) {
                alert('WebGL context lost — please reload.');
                e.preventDefault();
            }, false);
            canvas.addEventListener('mousedown', function() { canvas.focus(); });
            canvas.addEventListener('touchstart', function() { canvas.focus(); });
            return canvas;
        })(),
        onRuntimeInitialized: function() {
            document.getElementById('loading').style.display = 'none';
            if (window.self === window.top) {
                document.getElementById('canvas').style.display = 'none';
                document.getElementById('play-btn').style.display = 'block';
            } else {
                document.getElementById('canvas').focus();
            }
        }
    };

    document.getElementById('play-btn').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('canvas').style.display = 'block';
        var el = document.documentElement;
        var fn = el.requestFullscreen || el.webkitRequestFullscreen;
        if (fn) {
            var p = fn.call(el);
            if (p && p.then) {
                p.then(function() {
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(function(){});
                    }
                });
            }
        }
        document.getElementById('canvas').focus();
    });
</script>
{{{ SCRIPT }}}
</body>
</html>
